<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>Penguin Game</title>
        <style>
        /*tarayıcı kenar boşluklarını ve kaydırma çubuklarını gizler.*/
            body {
            margin: 0;
            overflow: hidden; 
            background-color: #071827;
            }
            canvas {
            display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="game"></canvas>

        <script>
            window.bgMusic = new Audio("sounds/sarki.mp3");
            window.bgMusic.loop = true;  
            window.bgMusic.volume = 0.6; 

            window.victorySound = new Audio("sounds/ypie.mp3");
            window.victorySound.loop = false; 
            window.victorySound.volume = 1.0; 

            window.boxBreakSound = new Audio("sounds/buzkirma.mp3");
            window.boxBreakSound.loop = false;
            window.boxBreakSound.volume = 0.8;
        </script>

        <script src="src/menu.js"></script>
        <script src="src/bolum1.js"></script>
        <script src="src/bolum2.js"></script>
        <script src="src/bolum3.js"></script>

        <script>
            window.returnToMenu = function() {
                startMenu(function() {
                    startBolum1(onLevel1Complete);
                }, function(levelNumber) {
                    if (levelNumber === 1) startBolum1(onLevel1Complete);
                    if (levelNumber === 2) startBolum2(onLevel2Complete);
                    if (levelNumber === 3) startBolum3();
                });
            };

            function onLevel1Complete() {
                startBolum2(onLevel2Complete);
            }

            function onLevel2Complete() {
                startBolum3();
            }

            window.onload = function() {
                window.returnToMenu();
            };
        </script>
    </body>
</html>
